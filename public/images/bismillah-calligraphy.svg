<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&amp;display=swap');
      .text { 
        font-family: 'Noto Nastaliq Urdu', serif; 
        font-size: 34px; 
        fill: #3a2517; 
        text-anchor: middle; 
        dominant-baseline: central; 
        letter-spacing: 2px;
      }
    </style>
  </defs>
  <!-- Clean authentic Bismillah rendered as Nastaliq calligraphy -->
